<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex</title>
  <link rel="icon" href="logo-pokémon.ico"></link>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-8">

  <h1 class="text-3xl font-bold text-center mb-6">Pokédex</h1>

  <input
    id="buscador"
    type="text"
    placeholder="Buscar Pokémon…"
    class="block mx-auto mb-6 px-4 py-2 rounded-xl border border-slate-300 w-80"
  >

  <div
    id="resultado"
    class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 max-w-5xl mx-auto"
  ></div>

  <script src="js/app.js"></script>
</body>
</html>
