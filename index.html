<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex</title>
  <link rel="icon" href="logo-pokémon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-6">

  <h1 class="text-3xl font-bold text-center text-slate-800 mb-6">Pokédex</h1>

  <!-- HU2: buscador + botón Buscar (mismo input de C09, ahora con botón al lado) -->
  <div class="max-w-md mx-auto flex gap-2 mb-6">
    <input id="buscador" type="text" placeholder="Busca un Pokémon (ej. charizard o 6)"
           class="flex-1 p-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-yellow-400">
    <button id="btn-buscar" class="px-4 py-2 bg-yellow-400 font-semibold rounded-lg hover:bg-yellow-500">
      Buscar
    </button>
  </div>

  <div id="resultado" class="grid grid-cols-2 md:grid-cols-3 gap-4 max-w-4xl mx-auto"></div>

  <!-- HU5: botón Cargar más -->
  <div class="text-center my-6">
    <button id="cargar-mas" class="px-4 py-2 bg-slate-700 text-white rounded-lg hover:bg-slate-800">
      Cargar más
    </button>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
